<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Claude Commander</title>
  <link rel="stylesheet" href="node_modules/xterm/css/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="panel">
    <!-- 런처 모드 -->
    <div id="launcher-view">
      <!-- 입력창 -->
      <div id="input-wrap">
        <div id="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <div id="session-chip" class="hidden">
          <span id="session-chip-name"></span>
        </div>
        <input
          id="search"
          type="text"
          placeholder="Claude에게 물어보거나 @이름 으로 새 세션..."
          autocomplete="off"
          spellcheck="false"
        />
        <div id="enter-hint" class="hidden">
          <span class="kbd">↵</span> 새 세션
        </div>
      </div>

      <!-- 구분선 -->
      <div id="divider"></div>

      <!-- 세션 목록 -->
      <div id="sessions-wrap">
        <div id="sessions-header">실행 중인 세션</div>
        <div id="sessions-list">
          <div class="empty-state">세션을 불러오는 중...</div>
        </div>
      </div>

      <!-- 하단 힌트 -->
      <div id="footer">
        <span><span class="kbd">↵</span> 터미널</span>
        <span><span class="kbd">⌘↵</span> 메시지 전송</span>
        <span><span class="kbd">Esc</span> 닫기</span>
        <span style="margin-left:auto"><input type="range" id="opacity-slider-launcher" min="40" max="100" value="82" title="투명도 조절"></span>
      </div>
    </div>

    <!-- 터미널 모드 -->
    <div id="terminal-view" class="hidden">
      <div id="term-header">
        <div id="term-tabs"></div>
        <div id="term-actions">
          <input type="range" id="opacity-slider" min="40" max="100" value="82" title="투명도 조절">
          <button id="btn-back" title="런처로 돌아가기">←</button>
          <button id="btn-new-tab" title="새 세션">+</button>
        </div>
      </div>
      <div id="term-body">
        <div id="term-container"></div>
      </div>
    </div>
  </div>

  <script src="node_modules/xterm/lib/xterm.js"></script>
  <script src="node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="app.js"></script>
</body>
</html>
